<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>席予約 WebMCP ハンズオン</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1 id="event-name">席予約</h1>

      <section>
        <h2>予約する</h2>
        <form
          action="http://localhost:8787/api/reservations"
          method="post"
          toolname="reserve_seat"
          tooldescription="参加者IDと席番号を指定して席を予約する。"
        >
          <label>
            参加者ID
            <input
              id="participant-id"
              name="participantId"
              required
              pattern="[A-Za-z0-9_\-]{1,64}"
              toolparamdescription="予約する参加者のID。"
            />
          </label>
          <label>
            席番号
            <input
              name="seatId"
              required
              pattern="[A-J]-([1-9]|10)"
              placeholder="A-5"
              toolparamdescription="予約する席のID。例: A-5。"
            />
          </label>
          <input type="hidden" name="source" value="webmcp" />
          <button type="submit">予約する</button>
        </form>
      </section>

      <section>
        <h2>自分の予約</h2>
        <p id="my-reservation">参加者IDを入力してください。</p>
        <button id="cancel-button" type="button" hidden>予約を解除する</button>
      </section>

      <section>
        <h2>席の状況</h2>
        <p id="summary">読み込み中...</p>
        <p class="hint">空席をクリックすると、予約フォームの席番号に入力されます。</p>
        <div id="seat-map" class="seat-map" aria-label="座席表"></div>
        <table>
          <thead><tr><th>席</th><th>状態</th></tr></thead>
          <tbody id="seat-list"></tbody>
        </table>
      </section>

      <p id="error" role="alert"></p>
    </main>

    <script src="./app.js"></script>
    <script src="./webmcp.js"></script>
  </body>
</html>
